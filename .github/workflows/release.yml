name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          choco install innosetup --no-progress -y

      - name: Verify Tag Matches App Version
        shell: powershell
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $appVersion = @'
from pathlib import Path
import re

text = Path("app/version.py").read_text(encoding="utf-8")
match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
if not match:
    raise SystemExit("Could not find __version__ in app/version.py")
print(match.group(1))
'@ | python -

          if ($appVersion.Trim() -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match app/version.py version ($appVersion)."
          }

      - name: Build Installer
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          .\scripts\build_release.ps1 -Version "${{ github.ref_name }}" -Clean

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v6
        with:
          name: NetOpsToolkit-installer-${{ github.ref_name }}
          path: dist/release/NetOpsToolkit-setup-*.exe
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          $asset = Get-ChildItem -Path dist/release/NetOpsToolkit-setup-*.exe | Select-Object -First 1 -ExpandProperty FullName
          .\scripts\publish_release.ps1 `
            -Repository "${{ github.repository }}" `
            -TagName "${{ github.ref_name }}" `
            -ReleaseName "NetOps Toolkit ${{ github.ref_name }}" `
            -AssetPath $asset
